<DOCTYPE html>
    <html>
        <head>
            <title>PROFILE CARD</title>
            <style>
                html,body{
                    height: 100%;
                    margin: 0;
                }
                body{
                    margin: 0;
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                     background-color: rgb(148, 17, 115);
                }
                .profile-img{
                    width: 90px;
                    border-radius: 50%;
                    margin-bottom: 20px;
                    height: 100px;
                }
                
                .body{
                    
                    margin-top: 0px;
                    margin-bottom: 20px;
                    
                    font-size: large;
                    
                    padding: 80px;
                    flex: 1;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
                .header{
                    
                    background-color: rgb(214, 108, 152);
                    font-family: Arial, Helvetica, sans-serif;
                    text-align: center;
                    padding: 70px;
                    
                }
                .card{
                    background-color: white;
                    padding: 20px;
                    width: 250px;
                    text-align: center;
                    border-radius: 20px;
                    

                }
                .card:hover{
                    transform: scale(1.04);
                }
            
                
                  
                
            </style>
            </head>
            <body>
                
            <div class="header">
                <h1>PROFILE CARD</h1>
                 
            </div>
            <div class="body"> 
            <div class="card">
                 <img src="profile.jpg.jpeg"
            class="profile-img">
                    <h2>Angel Elsa Samuel</h2>
                    <p>Frontend Developer|Learning MERN Stack</p>
            </div>
            
            </div>
            </body>
    </html>
