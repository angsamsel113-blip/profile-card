<DOCTYPE html>
    <html>
        <head>
            <title>PROFILE CARD</title>
            <style>
                html,body{
                    height: 100%;
                    margin: 0;
                }
                body{
                    margin: 0;
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                     background-color: rgb(219, 148, 216);
                }
                .profile-img{
                    width: 105px;
                    border-radius: 100%;
                    margin-bottom: 30px;
                    height: 115px;
                }
                
                .body{
                    
                    margin-top: 0px;
                    margin-bottom: 50px;
                    
                    font-size: large;
                    
                    padding: 80px;
                    flex: 1;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    padding-top: 120px;
                }
                
                    
                
                .card{
                    background-color: rgb(252, 233, 233);
                    padding: 35px;
                    line-height: 1.4;
                    height: 300px;
                    width: 250px;
                    text-align: center;
                    border-radius: 18px;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                    
                    

                }
                .card:hover{
                    transform: scale(1.04);
                }
            
                
                  
                
            </style>
            </head>
            <body>
                
            
            <div class="body"> 
            <div class="card">
                 <img src="profile.jpg.jpeg"
            class="profile-img">
                    <h2>Angel Elsa Samuel</h2>
                    <p> Aspiring Frontend Developer | Learning MERN Stack</p>
            </div>
            
            </div>
            </body>
    </html>
